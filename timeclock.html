<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time Clock — Pointy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="pointy.css" />
    <link rel="stylesheet" href="timeclock.css" />
  </head>
  <body class="tc-body">

    <!-- Loading -->
    <div class="tc-screen" id="tcScreenLoading">
      <div class="tc-spinner"></div>
    </div>

    <!-- Activation (device not registered) -->
    <div class="tc-screen hidden" id="tcScreenActivate">
      <div class="tc-card">
        <div class="tc-brand">Pointy</div>
        <div class="tc-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 class="tc-card-title">Register This Device</h1>
        <p class="tc-card-sub">Enter the activation code from<br/>Settings → Time Clock in your POS.</p>
        <input type="text" id="tcActivateInput" class="tc-code-input" placeholder="ABC123" maxlength="6" autocomplete="off" spellcheck="false" />
        <p class="tc-error hidden" id="tcActivateError">Invalid code. Check your POS settings.</p>
        <button class="tc-btn tc-btn--primary" id="tcActivateBtn" type="button">Activate</button>
      </div>
    </div>

    <!-- Login -->
    <div class="tc-screen hidden" id="tcScreenLogin">
      <div class="tc-card">
        <div class="tc-brand">Pointy</div>
        <p class="tc-business-name" id="tcBusinessName"></p>
        <h1 class="tc-card-title">Staff Sign In</h1>
        <div class="tc-field">
          <label for="tcEmail">Email</label>
          <input type="email" id="tcEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="tc-field">
          <label for="tcPassword">Password</label>
          <input type="password" id="tcPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p class="tc-error hidden" id="tcLoginError">Incorrect email or password.</p>
        <button class="tc-btn tc-btn--primary" id="tcLoginBtn" type="button">Sign In</button>
      </div>
    </div>

    <!-- Shift screen -->
    <div class="tc-screen hidden" id="tcScreenShift">
      <div class="tc-shift-card">
        <div class="tc-shift-header">
          <div class="tc-avatar" id="tcAvatar"></div>
          <div>
            <div class="tc-shift-name" id="tcStaffName"></div>
            <div class="tc-shift-status" id="tcShiftStatus"></div>
          </div>
        </div>

        <!-- Timer block -->
        <div class="tc-timer-block" id="tcTimerBlock">
          <div class="tc-timer" id="tcTimerDisplay">0:00:00</div>
          <div class="tc-timer-label" id="tcTimerLabel">Time on shift</div>
        </div>

        <!-- Action buttons -->
        <div class="tc-actions" id="tcActions"></div>

        <!-- Today summary (shown after clock-out) -->
        <div class="tc-summary hidden" id="tcSummary"></div>

        <button class="tc-signout-btn" id="tcSignOutBtn" type="button">Sign out</button>
      </div>
    </div>

    <script type="module" src="/Javascript/timeclock.js"></script>
  </body>
</html>
